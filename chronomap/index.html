<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#7a4a25">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ChronoMap">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>ChronoMap Deutschland</title>

<link rel="stylesheet" href="vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/map.css">
<link rel="stylesheet" href="css/layout.css">
</head>
<body>

<div id="map"></div>

<div id="titlebar" class="parchment">
  <h1 id="appTitle">ChronoMap Deutschland</h1>
  <div class="sub" id="subtitle"></div>
</div>

<div id="status">Lädt …</div>

<section id="panel" class="parchment" aria-label="Bedienung">
  <div class="panel-scroll">

    <div class="timeline">
      <div class="tl-head">
        <span id="yearOut">—</span>
        <span id="eraLabel"></span>
      </div>
      <div class="tl-slider-wrap">
        <div id="ticks"></div>
        <input type="range" id="slider" min="0" max="1" value="0" aria-label="Jahr">
      </div>
      <p id="blurb"></p>
    </div>

    <hr class="rule">

    <div class="layers">
      <span class="lbl" id="layersLabel">Ebenen</span>
      <label><input type="checkbox" id="layerTerritories" checked><span id="lblTerritories">Territorien</span></label>
      <label><input type="checkbox" id="layerSettlements" checked><span id="lblSettlements">Städte</span></label>
      <label><input type="checkbox" id="layerCultures"><span id="lblCultures">Kultur</span></label>
    </div>

    <hr class="rule">

    <div class="factions-head">
      <h2 id="factionsHeading">Mächte</h2>
      <div class="hint" id="factionsHint"></div>
    </div>
    <div id="factionList"></div>

    <div id="factionInfo"></div>

  </div>
</section>

<script src="vendor/leaflet/leaflet.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
